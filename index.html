<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141417">
<title>Heavy Duty Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#141417;color:#EDEAE3;font-family:'Inter',system-ui,sans-serif}
.app{max-width:560px;margin:0 auto;padding:0 14px 90px}
header{padding:22px 2px 10px}
.brand{font-family:'Archivo Black',sans-serif;font-size:26px;letter-spacing:.02em;line-height:1}
.brand-sub{font-size:12px;color:#8a8a90;margin-top:6px}
nav{display:flex;gap:8px;position:sticky;top:0;background:#141417;padding:10px 0;z-index:5}
.tab{flex:1;padding:10px 0;background:transparent;color:#8a8a90;border:1px solid #2b2b30;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.tab.on{color:#EDEAE3;border-color:#EDEAE3}
.seg-row{display:flex;gap:8px;margin-bottom:10px}
.seg{flex:1;padding:10px 4px;background:#1e1e22;color:#EDEAE3;border:1px solid #2b2b30;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center}
.seg small{display:block;font-size:11px;opacity:.7;font-weight:600}
.seg.on-w{border-color:#EDEAE3}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin:4px 0 12px;gap:10px}
.meta-label{font-size:12px;color:#8a8a90;display:flex;align-items:center;gap:8px}
input[type=date]{background:#1e1e22;border:1px solid #2b2b30;color:#EDEAE3;border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit}
.rep-badge{font-size:12px;font-weight:700;color:#141417;background:#EDEAE3;border-radius:999px;padding:6px 12px;white-space:nowrap}
.ex-card{background:#1e1e22;border:1px solid #2b2b30;border-radius:12px;padding:12px 12px 14px;margin-bottom:10px}
.ex-name{font-weight:700;font-size:15px}
.ex-hint{font-size:12px;color:#8a8a90;margin:3px 0 10px}
.ex-inputs{display:flex;align-items:center;gap:8px}
.num{width:74px;padding:12px 10px;font-size:17px;font-weight:700;background:#141417;color:#EDEAE3;border:1px solid #2b2b30;border-radius:10px;text-align:center;font-family:inherit}
.unit{font-size:13px;color:#8a8a90}
.fail{margin-left:auto;padding:10px 14px;font-size:13px;font-weight:700;background:transparent;color:#8a8a90;border:1px solid #2b2b30;border-radius:999px;cursor:pointer;font-family:inherit}
textarea{width:100%;background:#1e1e22;border:1px solid #2b2b30;color:#EDEAE3;border-radius:12px;padding:12px;font-size:14px;margin-top:4px;resize:vertical;font-family:inherit}
.save{width:100%;margin-top:12px;padding:16px 0;font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:.04em;background:#EDEAE3;color:#141417;border:none;border-radius:12px;cursor:pointer}
select{width:100%;padding:12px 10px;font-size:15px;background:#1e1e22;color:#EDEAE3;border:1px solid #2b2b30;border-radius:10px;margin-bottom:12px;font-family:inherit}
.chart-card{background:#1e1e22;border:1px solid #2b2b30;border-radius:12px;padding:14px 10px 6px}
.delta{margin-top:10px;font-size:14px;font-weight:700;text-align:center}
.empty{padding:40px 16px;text-align:center;color:#8a8a90;font-size:14px;line-height:1.5}
.hist-card{background:#1e1e22;border:1px solid #2b2b30;border-radius:12px;margin-bottom:8px;overflow:hidden}
.hist-head{display:flex;align-items:center;gap:10px;width:100%;padding:14px 12px;background:transparent;border:none;color:#EDEAE3;font-size:14px;cursor:pointer;text-align:left;font-family:inherit}
.dot{width:10px;height:10px;border-radius:999px;flex-shrink:0}
.hist-title{font-weight:700;flex:1}
.hist-date{color:#8a8a90;font-size:12px}
.hist-body{padding:0 12px 12px}
.hist-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-top:1px solid #2b2b30}
.hist-nums{font-weight:700}
.hist-notes{font-size:13px;color:#8a8a90;margin-top:8px;font-style:italic}
.del{margin-top:10px;padding:8px 12px;font-size:12px;background:transparent;color:#c0564f;border:1px solid #3a2a29;border-radius:8px;cursor:pointer;font-family:inherit}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#EDEAE3;color:#141417;padding:10px 18px;border-radius:999px;font-size:14px;font-weight:700;z-index:20}
.data-btns{display:flex;gap:8px;margin-top:18px}
.data-btn{flex:1;padding:12px 0;font-size:13px;font-weight:700;background:transparent;color:#8a8a90;border:1px solid #2b2b30;border-radius:10px;cursor:pointer;font-family:inherit}
.hidden{display:none}
svg text{font-family:'Inter',sans-serif}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">HEAVY DUTY LOG</div>
    <div class="brand-sub">Mentzer 3-way split · train to failure</div>
  </header>
  <nav>
    <button class="tab on" data-tab="log">Log</button>
    <button class="tab" data-tab="progress">Progress</button>
    <button class="tab" data-tab="history">History</button>
  </nav>
  <main id="main"></main>
</div>
<script>
const WORKOUTS = {
  1:{name:"Chest & Back",reps:"6–10",ex:["Pec Deck (or DB Fly)","Incline Press","Machine Pullover","Close-Grip Underhand Pulldown","Deadlift"]},
  2:{name:"Legs & Abs",reps:"12–20",ex:["Leg Extension","Leg Press (or Squat)","Leg Curl","Standing Calf Raise","Weighted Sit-ups"]},
  3:{name:"Shoulders & Arms",reps:"6–10",ex:["Lateral Raise","Rear Delt Fly","Barbell or DB Curl","Cable Triceps Pressdown","Weighted Dips"]}
};
const SUGGESTED = {
  Andrew:{"Pec Deck (or DB Fly)":80,"Incline Press":30,"Machine Pullover":35,"Close-Grip Underhand Pulldown":85,"Deadlift":95,"Leg Extension":110,"Leg Press (or Squat)":115,"Leg Curl":75,"Standing Calf Raise":90,"Weighted Sit-ups":25,"Lateral Raise":12,"Rear Delt Fly":55,"Barbell or DB Curl":35,"Cable Triceps Pressdown":30,"Weighted Dips":0},
  Tshristi:{"Pec Deck (or DB Fly)":20,"Incline Press":10,"Machine Pullover":20,"Close-Grip Underhand Pulldown":45,"Deadlift":55,"Leg Extension":40,"Leg Press (or Squat)":70,"Leg Curl":50,"Standing Calf Raise":30,"Weighted Sit-ups":5,"Lateral Raise":5,"Rear Delt Fly":15,"Barbell or DB Curl":15,"Cable Triceps Pressdown":15,"Weighted Dips":-40}
};
const PEOPLE=["Andrew","Tshristi"];
const PLATE={Andrew:"#4C8DFF",Tshristi:"#F5B72E"};
const KEY="hd-sessions-v1";

let sessions=[]; try{sessions=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){}
let tab="log", logPerson="Andrew", logWorkout=1, progPerson="Andrew", progEx=WORKOUTS[1].ex[0], openHist=null;
let draft={}, draftNotes="", draftDate=today();

function today(){return new Date().toISOString().slice(0,10)}
function fmt(iso){const d=new Date(iso+"T12:00:00");return d.toLocaleDateString(undefined,{month:"short",day:"numeric"})}
function persist(){localStorage.setItem(KEY,JSON.stringify(sessions))}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}

function lastFor(person,ex){
  const past=sessions.filter(s=>s.person===person).flatMap(s=>s.entries.filter(e=>e.exercise===ex&&e.weight!=="").map(e=>({...e,date:s.date})));
  return past.length?past[past.length-1]:null;
}

function render(){
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  const m=document.getElementById("main");
  if(tab==="log")m.innerHTML=logView();
  else if(tab==="progress")m.innerHTML=progView();
  else m.innerHTML=histView();
  bind();
}

function segRowPeople(sel,cls){
  return `<div class="seg-row">`+PEOPLE.map(p=>{
    const on=sel===p?`style="background:${PLATE[p]};color:#111;border-color:${PLATE[p]}"`:"";
    return `<button class="seg ${cls}" data-p="${p}" ${on}>${p}</button>`;
  }).join("")+`</div>`;
}

function logView(){
  const w=WORKOUTS[logWorkout];
  let h=segRowPeople(logPerson,"log-p");
  h+=`<div class="seg-row">`+[1,2,3].map(n=>`<button class="seg log-w ${logWorkout===n?"on-w":""}" data-w="${n}"><small>W${n}</small>${WORKOUTS[n].name}</button>`).join("")+`</div>`;
  h+=`<div class="meta-row"><label class="meta-label">Date <input type="date" id="date" value="${draftDate}"></label><div class="rep-badge">Target ${w.reps} reps</div></div>`;
  w.ex.forEach((ex,i)=>{
    const last=lastFor(logPerson,ex), sug=SUGGESTED[logPerson][ex], d=draft[ex]||{};
    const hint=last?`Last: ${esc(last.weight)} × ${esc(last.reps)} (${fmt(last.date)})`:`Comeback suggestion: ${sug}${sug<0?" (assisted)":" lb"}`;
    const fs=d.failure?`style="background:${PLATE[logPerson]};color:#111;border-color:${PLATE[logPerson]}"`:"";
    h+=`<div class="ex-card"><div class="ex-name">${i+1}. ${ex}</div><div class="ex-hint">${hint}</div>
      <div class="ex-inputs">
        <input class="num wt" data-ex="${esc(ex)}" inputmode="decimal" placeholder="${last?esc(last.weight):sug}" value="${esc(d.weight??"")}">
        <span class="unit">lb ×</span>
        <input class="num rp" data-ex="${esc(ex)}" inputmode="numeric" placeholder="reps" value="${esc(d.reps??"")}">
        <button class="fail" data-ex="${esc(ex)}" ${fs}>Failure</button>
      </div></div>`;
  });
  h+=`<textarea id="notes" rows="2" placeholder="Notes — form cues, machine settings, how it felt…">${esc(draftNotes)}</textarea>`;
  h+=`<button class="save" id="save">Save workout</button>`;
  h+=`<div class="data-btns"><button class="data-btn" id="export">Export data</button><button class="data-btn" id="import">Import data</button></div>
      <input type="file" id="importFile" class="hidden" accept=".json,application/json">`;
  return h;
}

function progView(){
  let h=segRowPeople(progPerson,"prog-p");
  h+=`<select id="exSel">`+Object.entries(WORKOUTS).map(([n,w])=>`<optgroup label="W${n} · ${w.name}">`+w.ex.map(ex=>`<option ${ex===progEx?"selected":""}>${ex}</option>`).join("")+`</optgroup>`).join("")+`</select>`;
  const data=sessions.filter(s=>s.person===progPerson).flatMap(s=>s.entries.filter(e=>e.exercise===progEx&&e.weight!=="").map(e=>({date:s.date,weight:parseFloat(e.weight),reps:e.reps}))).filter(d=>!isNaN(d.weight)).sort((a,b)=>a.date<b.date?-1:1);
  if(!data.length){h+=`<div class="empty">No sets logged yet for this lift. Once you log a couple of sessions, the progression line shows up here.</div>`;return h}
  h+=`<div class="chart-card">${chartSVG(data,PLATE[progPerson])}</div>`;
  if(data.length>1){const a=data[0].weight,b=data[data.length-1].weight,d=b-a;
    h+=`<div class="delta">${d>=0?"▲":"▼"} ${Math.abs(d)} lb since ${fmt(data[0].date)} (${a} → ${b})</div>`}
  return h;
}

function chartSVG(data,color){
  const W=520,H=240,P={t:16,r:14,b:28,l:38};
  const ws=data.map(d=>d.weight);
  let min=Math.min(...ws),max=Math.max(...ws);
  if(min===max){min-=5;max+=5}
  const pad=(max-min)*0.12; min-=pad; max+=pad;
  const x=i=>data.length===1?W/2:P.l+i*(W-P.l-P.r)/(data.length-1);
  const y=v=>P.t+(1-(v-min)/(max-min))*(H-P.t-P.b);
  let g="";
  for(let i=0;i<=3;i++){const v=min+(max-min)*i/3,yy=y(v);
    g+=`<line x1="${P.l}" x2="${W-P.r}" y1="${yy}" y2="${yy}" stroke="#2b2b30" stroke-dasharray="3 3"/>
        <text x="${P.l-6}" y="${yy+4}" fill="#8a8a90" font-size="10" text-anchor="end">${Math.round(v)}</text>`}
  const pts=data.map((d,i)=>`${x(i)},${y(d.weight)}`).join(" ");
  const dots=data.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d.weight)}" r="4" fill="${color}"/>
    <text x="${x(i)}" y="${y(d.weight)-9}" fill="#EDEAE3" font-size="10" font-weight="700" text-anchor="middle">${d.weight}×${esc(d.reps)}</text>
    <text x="${x(i)}" y="${H-8}" fill="#8a8a90" font-size="10" text-anchor="middle">${fmt(d.date)}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Progression chart">${g}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5"/>${dots}</svg>`;
}

function histView(){
  const list=[...sessions].sort((a,b)=>a.date<b.date?1:-1);
  if(!list.length)return `<div class="empty">Nothing logged yet. Hit the Log tab after your first workout back.</div>`;
  return list.map(s=>{
    const open=openHist===s.id;
    let body="";
    if(open){
      body=`<div class="hist-body">`+s.entries.map(e=>`<div class="hist-row"><span>${esc(e.exercise)}</span><span class="hist-nums">${esc(e.weight)} × ${esc(e.reps)} ${e.failure?"✓F":""}</span></div>`).join("");
      if(s.notes)body+=`<div class="hist-notes">“${esc(s.notes)}”</div>`;
      body+=`<button class="del" data-id="${s.id}">Delete entry</button></div>`;
    }
    return `<div class="hist-card"><button class="hist-head" data-id="${s.id}">
      <span class="dot" style="background:${PLATE[s.person]}"></span>
      <span class="hist-title">${esc(s.person)} · W${s.workout} ${esc(s.workoutName)}</span>
      <span class="hist-date">${fmt(s.date)}</span></button>${body}</div>`;
  }).join("");
}

function bind(){
  document.querySelectorAll(".log-p").forEach(b=>b.onclick=()=>{logPerson=b.dataset.p;render()});
  document.querySelectorAll(".prog-p").forEach(b=>b.onclick=()=>{progPerson=b.dataset.p;render()});
  document.querySelectorAll(".log-w").forEach(b=>b.onclick=()=>{logWorkout=+b.dataset.w;draft={};render()});
  const date=document.getElementById("date"); if(date)date.onchange=e=>draftDate=e.target.value;
  document.querySelectorAll(".wt").forEach(i=>i.oninput=e=>{draft[i.dataset.ex]={...(draft[i.dataset.ex]||{}),weight:e.target.value}});
  document.querySelectorAll(".rp").forEach(i=>i.oninput=e=>{draft[i.dataset.ex]={...(draft[i.dataset.ex]||{}),reps:e.target.value}});
  document.querySelectorAll(".fail").forEach(b=>b.onclick=()=>{const d=draft[b.dataset.ex]||{};d.failure=!d.failure;draft[b.dataset.ex]=d;render()});
  const notes=document.getElementById("notes"); if(notes)notes.oninput=e=>draftNotes=e.target.value;
  const save=document.getElementById("save");
  if(save)save.onclick=()=>{
    const w=WORKOUTS[logWorkout];
    const entries=w.ex.map(ex=>({exercise:ex,weight:(draft[ex]?.weight??"").trim(),reps:(draft[ex]?.reps??"").trim(),failure:!!draft[ex]?.failure})).filter(e=>e.weight!==""||e.reps!=="");
    if(!entries.length){toast("Enter at least one set");return}
    sessions.push({id:Date.now().toString(36),date:draftDate,person:logPerson,workout:logWorkout,workoutName:w.name,entries,notes:draftNotes.trim()});
    sessions.sort((a,b)=>a.date<b.date?-1:1);
    persist(); draft={}; draftNotes=""; draftDate=today();
    toast("Workout saved"); tab="history"; render();
  };
  document.querySelectorAll(".hist-head").forEach(b=>b.onclick=()=>{openHist=openHist===b.dataset.id?null:b.dataset.id;render()});
  document.querySelectorAll(".del").forEach(b=>b.onclick=()=>{sessions=sessions.filter(s=>s.id!==b.dataset.id);persist();toast("Deleted");render()});
  const exSel=document.getElementById("exSel"); if(exSel)exSel.onchange=e=>{progEx=e.target.value;render()};
  const exp=document.getElementById("export");
  if(exp)exp.onclick=()=>{
    const blob=new Blob([JSON.stringify(sessions,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="heavy-duty-log-backup.json";a.click();
    toast("Backup downloaded");
  };
  const imp=document.getElementById("import"), impFile=document.getElementById("importFile");
  if(imp)imp.onclick=()=>impFile.click();
  if(impFile)impFile.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{
      const arr=JSON.parse(r.result);
      if(!Array.isArray(arr))throw 0;
      const ids=new Set(sessions.map(s=>s.id));
      arr.forEach(s=>{if(s&&s.id&&!ids.has(s.id))sessions.push(s)});
      sessions.sort((a,b)=>a.date<b.date?-1:1);
      persist();toast("Data imported");render();
    }catch(err){toast("Couldn't read that file")}};
    r.readAsText(f);
  };
}

document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});
render();
</script>
</body>
</html>
